services:
  - type: web
    name: forex-poc-backend
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: https://forex-poc-frontend.vercel.app
      - key: PYTHON_VERSION
        value: 3.11.6
